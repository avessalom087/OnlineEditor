name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Измените на master, если ваша ветка по умолчанию называется master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          cd online-editor
          npm ci
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: online-editor/dist # Путь к скомпилированной папке
